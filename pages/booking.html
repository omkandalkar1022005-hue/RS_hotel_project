<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Your Stay | Hotel Royal Stay</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins', sans-serif;
}

body{
background:linear-gradient(to right, #a3f4ad, #e6f4e6);
color:#333;
}

.page-title{
background:#040200;
color:white;
text-align:center;
padding:15px;
font-size:24px;
font-weight:bold;
position:sticky;
top:120px;
z-index:999;
}

header{
background:#ffd700;
color:black;
text-align:center;
padding:20px;
font-size:28px;
font-weight:bold;
position:sticky;
top:0;
z-index:1000;
}

.menu{
display:flex;
justify-content:center;
gap:40px;
background:#eec8ba;
padding:12px;
position:sticky;
top:70px;
z-index:1000;
}

.menu a{
text-decoration:none;
color:black;
font-weight:600;
font-size:18px;
}

.menu a:hover{
color:#ff6600;
}

.room-buttons{
display:flex;
justify-content:center;
gap:20px;
padding:30px;
flex-wrap:wrap;
}

.room-buttons button{
padding:12px 25px;
border:none;
background:linear-gradient(45deg,#ffcc00,#ff9900);
font-weight:bold;
cursor:pointer;
border-radius:8px;
transition:0.3s;
}

.room-buttons button:hover{
transform:scale(1.05);
}

.form-container{
max-width:600px;
margin:20px auto;
background:white;
color:black;
padding:30px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

.form-container h2{
text-align:center;
margin-bottom:20px;
color:#243b55;
}

input, select{
width:100%;
padding:10px;
margin:10px 0;
border-radius:5px;
border:1px solid #ccc;
}

.pay-btn{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
font-size:16px;
font-weight:bold;
background:linear-gradient(45deg,#00c853,#64dd17);
color:white;
cursor:pointer;
transition:0.3s;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.pay-btn:hover{
transform:scale(1.05);
background:linear-gradient(45deg,#64dd17,#00c853);
}

.bill-btn{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:10px;
font-size:17px;
font-weight:bold;
background:linear-gradient(45deg,#ff9800,#ff5722);
color:white;
cursor:pointer;
transition:0.3s;
box-shadow:0 6px 18px rgba(0,0,0,0.4);
}

.bill-btn:hover{
transform:scale(1.05);
background:linear-gradient(45deg,#ff5722,#ff9800);
}

.submit-btn{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
font-size:16px;
font-weight:bold;
background:linear-gradient(45deg,#5ac418,#4CAF50);
color:white;
cursor:pointer;
transition:0.3s;
}

.submit-btn:hover{
opacity:0.9;
}

footer{
text-align:center;
padding:20px;
margin-top:30px;
background:black;
color:#f6f1f1;
}

.room-price{
text-align:center;
margin:10px 0;
font-size:18px;
color:#243b55;
font-weight:bold;
}
</style>
</head>
<!-- Header मध्ये लॉगिन बटण -->
<div class="navbar">
    <div class="logo">HOTEL ROYAL STAY</div>
    <div class="menu">
        <!-- तुमचे मेन्यू लिंक्स -->
    </div>
    <div class="user-section" style="position:absolute; right:20px; top:15px;">
        <button onclick="openLoginModal()" id="loginBtn" style="padding:8px 20px; background:#ffd700; border:none; border-radius:5px; cursor:pointer;">
            <i class="fas fa-user"></i> Login
        </button>
        <div id="userProfile" style="display:none;">
            <img id="userAvatar" src="" style="width:40px; height:40px; border-radius:50%; cursor:pointer;" onclick="showUserMenu()">
            <div id="userMenu" style="display:none; position:absolute; background:white; color:black; padding:10px; border-radius:5px;">
                <p>👤 <span id="userName"></span></p>
                <p>📧 <span id="userEmail"></span></p>
                <hr>
                <button onclick="logout()">Logout</button>
            </div>
        </div>
    </div>
</div>

<!-- Login Modal -->
<div id="loginModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:3000; justify-content:center; align-items:center;">
    <div style="background:white; width:400px; padding:40px; border-radius:20px; position:relative; animation:modalPop 0.3s;">
        
        <!-- Close Button -->
        <span onclick="closeModal()" style="position:absolute; right:20px; top:20px; font-size:24px; cursor:pointer; color:#666;">&times;</span>
        
        <!-- Logo -->
        <div style="text-align:center; margin-bottom:30px;">
            <i class="fas fa-crown" style="font-size:48px; color:#ffd700;"></i>
            <h2 style="color:#333; margin-top:10px;">Hotel Royal Stay</h2>
        </div>
        
        <!-- Tab Buttons -->
        <div style="display:flex; margin-bottom:20px;">
            <button id="loginTab" onclick="switchTab('login')" style="flex:1; padding:10px; background:#ffd700; border:none; border-radius:10px 0 0 10px; font-weight:bold;">Login</button>
            <button id="registerTab" onclick="switchTab('register')" style="flex:1; padding:10px; background:#f0f0f0; border:none; border-radius:0 10px 10px 0; font-weight:bold;">Register</button>
        </div>
        
        <!-- Login Form -->
        <div id="loginForm">
            <div style="margin-bottom:15px;">
                <label style="color:#333; display:block; margin-bottom:5px;">📧 Email</label>
                <input type="email" id="loginEmail" style="width:100%; padding:12px; border:1px solid #ddd; border-radius:8px;" placeholder="Enter your email">
            </div>
            <div style="margin-bottom:20px;">
                <label style="color:#333; display:block; margin-bottom:5px;">🔒 Password</label>
                <input type="password" id="loginPassword" style="width:100%; padding:12px; border:1px solid #ddd; border-radius:8px;" placeholder="Enter your password">
            </div>
            <button onclick="login()" style="width:100%; padding:14px; background:linear-gradient(90deg,#ffd700,#ffaa00); border:none; border-radius:8px; font-weight:bold; font-size:16px; cursor:pointer;">
                Login Now
            </button>
            <p style="text-align:center; margin-top:15px; color:#666;">
                Forgot password? <a href="#" onclick="forgotPassword()">Reset</a>
            </p>
        </div>
        
        <!-- Register Form -->
        <div id="registerForm" style="display:none;">
            <div style="margin-bottom:15px;">
                <label style="color:#333; display:block; margin-bottom:5px;">👤 Full Name</label>
                <input type="text" id="regName" style="width:100%; padding:12px; border:1px solid #ddd; border-radius:8px;" placeholder="Enter your name">
            </div>
            <div style="margin-bottom:15px;">
                <label style="color:#333; display:block; margin-bottom:5px;">📧 Email</label>
                <input type="email" id="regEmail" style="width:100%; padding:12px; border:1px solid #ddd; border-radius:8px;" placeholder="Enter your email">
            </div>
            <div style="margin-bottom:15px;">
                <label style="color:#333; display:block; margin-bottom:5px;">📱 Mobile</label>
                <input type="tel" id="regMobile" style="width:100%; padding:12px; border:1px solid #ddd; border-radius:8px;" placeholder="Enter 10 digit mobile">
            </div>
            <div style="margin-bottom:20px;">
                <label style="color:#333; display:block; margin-bottom:5px;">🔒 Password</label>
                <input type="password" id="regPassword" style="width:100%; padding:12px; border:1px solid #ddd; border-radius:8px;" placeholder="Create password">
            </div>
            <button onclick="register()" style="width:100%; padding:14px; background:linear-gradient(90deg,#ffd700,#ffaa00); border:none; border-radius:8px; font-weight:bold; font-size:16px; cursor:pointer;">
                Create Account
            </button>
        </div>
    </div>
</div>
<body>
    <header>
👑 HOTEL ROYAL STAY – LUXURY LODGING 👑
</header>

<div class="menu">
<a href="homepage.html">Home</a>
<a href="restaurant.html">Restaurant</a>
<a href="h_lodge.html">Lodging</a>
<a href="h_bar.html">Bar</a>
<a href="h2.html">Hall & Lawn</a>
</div>

<div class="page-title">
Hotel Royal Stay - Booking Page
</div>

<!-- Room Selection Buttons -->
<div class="room-buttons">
<button onclick="selectRoom('Deluxe AC Room', 4999)">🌟 Deluxe AC Room - ₹4,999/ night</button>
<button onclick="selectRoom('Executive Suite', 7999)">💼 Executive Suite - ₹7,999/ night</button>
<button onclick="selectRoom('Royal Premium Suite', 12999)">👑 Royal Premium Suite - ₹12,999/ night</button>
</div>

<!-- Booking Form -->
<div class="form-container">
<h2>Customer Details</h2>

<form onsubmit="return submitBooking()">

<label>Selected Room</label>
<input type="text" id="roomType" readonly required>

<div id="priceDisplay" class="room-price"></div>
<input type="hidden" id="roomPrice">

<label>Full Name</label>
<input type="text" id="fullName" required>

<label>Mobile Number</label>
<input type="tel" id="mobile" pattern="[0-9]{10}" placeholder="Enter 10 digit number" required>

<label>Gender</label>
<select id="gender" required>
<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>

<label>Age</label>
<input type="number" id="age" min="1" max="100" required>

<label>Email</label>
<input type="email" id="email" required>

<label>Check-in Date</label>
<input type="date" id="checkin" required>

<label>Check-out Date</label>
<input type="date" id="checkout" required>

<label>Number of Nights</label>
<input type="number" id="nights" min="1" value="1" required>

<label>Total Amount</label>
<input type="text" id="totalAmount" readonly style="background:#f0f0f0; font-weight:bold;">

<label>Payment Mode</label>
<select id="paymentMode" required>
<option value="">Select Payment Mode</option>
<option>UPI</option>
<option>Card</option>
<option>Net Banking</option>
</select>

<button type="button" onclick="payNow()" class="pay-btn">Pay Now</button>

<button type="button" onclick="generateBill()" id="billBtn" style="display:none;" class="bill-btn">
🧾 Generate Bill
</button>

<input type="submit" value="Confirm Booking" class="submit-btn" id="confirmBtn" style="display:none;">

</form>
</div>

<footer>
© 2026 Hotel Royal Stay | Book Smart • Stay Royal
</footer>

<script>
let paymentDone = false;
let bookingConfirmed = false;
let selectedRoomPrice = 0;
let paymentMode = "";
const { jsPDF } = window.jspdf;

const roomPrices = {
    'Deluxe AC Room': 4999,
    'Executive Suite': 7999,
    'Royal Premium Suite': 12999
};

function selectRoom(roomName, price){
    document.getElementById("roomType").value = roomName;
    selectedRoomPrice = price;
    document.getElementById("roomPrice").value = price;
    document.getElementById("priceDisplay").innerHTML = `💰 Room Price: ₹${price} per night`;
    calculateTotal();
    window.scrollTo({top:300, behavior:'smooth'});
}

function calculateTotal(){
    let nights = document.getElementById("nights").value;
    let total = selectedRoomPrice * nights;
    if(total > 0){
        document.getElementById("totalAmount").value = "₹" + total;
    }
}

document.getElementById("nights").addEventListener('input', calculateTotal);

function payNow(){
    paymentMode = document.getElementById("paymentMode").value;

    if(paymentMode === ""){
        alert("Please select payment mode!");
        return;
    }

    if(document.getElementById("roomType").value === ""){
        alert("Please select room first!");
        return;
    }

    if(!validateForm()){
        return;
    }

    alert("Payment Successful via " + paymentMode + " ✅\nAmount Paid: " + document.getElementById("totalAmount").value);

    paymentDone = true;
    document.getElementById("confirmBtn").style.display = "block";
}

function validateForm(){
    let fields = ['fullName', 'mobile', 'gender', 'age', 'email', 'checkin', 'checkout', 'nights'];
    for(let field of fields){
        if(document.getElementById(field).value === ""){
            alert("Please fill all details!");
            return false;
        }
    }
    return true;
}

function submitBooking(){
    if(!paymentDone){
        alert("Please complete payment first!");
        return false;
    }

    alert("Booking Confirmed Successfully! 🎉");
    bookingConfirmed = true;

    document.getElementById("billBtn").style.display = "block";
    document.getElementById("confirmBtn").style.display = "none";

    return false;
}

function generateBill(){
    if(!paymentDone || !bookingConfirmed){
        alert("Please complete payment and confirm booking first!");
        return;
    }

    let room = document.getElementById("roomType").value;
    let name = document.getElementById("fullName").value;
    let mobile = document.getElementById("mobile").value;
    let email = document.getElementById("email").value;
    let gender = document.getElementById("gender").value;
    let age = document.getElementById("age").value;
    let checkin = document.getElementById("checkin").value;
    let checkout = document.getElementById("checkout").value;
    let nights = document.getElementById("nights").value;
    let totalAmountStr = document.getElementById("totalAmount").value;
    let totalAmount = parseInt(totalAmountStr.replace('₹', ''));
    
    let billId = "BK" + Math.floor(Math.random() * 10000);
    let today = new Date();
    
    const doc = new jsPDF();
    
    // ---------- Page 1 ----------
    // Header with Gold Color
    doc.setFillColor(255, 215, 0);
    doc.rect(0, 0, 210, 40, 'F');
    
    doc.setFontSize(24);
    doc.setTextColor(0, 0, 0);
    doc.setFont("helvetica", "bold");
    doc.text(" HOTEL ROYAL STAY", 45, 20);
    
    doc.setFontSize(14);
    doc.setTextColor(50, 50, 50);
    doc.text("Room Booking Invoice", 65, 32);
    
    // Decorative Line
    doc.setDrawColor(255, 215, 0);
    doc.setLineWidth(0.5);
    doc.line(20, 45, 190, 45);
    
    // Bill Details Box
    doc.setFillColor(245, 245, 245);
    doc.roundedRect(20, 50, 170, 55, 3, 3, 'F');
    
    doc.setFontSize(10);
    doc.setTextColor(100, 100, 100);
    doc.text("Bill ID:", 25, 62);
    doc.text("Date:", 25, 72);
    doc.text("Customer:", 25, 82);
    doc.text("Mobile:", 25, 92);
    
    doc.setTextColor(0, 0, 0);
    doc.setFont("helvetica", "bold");
    doc.text(billId, 70, 62);
    doc.text(today.toLocaleDateString(), 70, 72);
    doc.text(name.substring(0, 20), 70, 82);
    doc.text(mobile, 70, 92);
    
    // Room Details Header
    doc.setFontSize(12);
    doc.setTextColor(255, 215, 0);
    doc.setFont("helvetica", "bold");
    doc.text(" ROOM DETAILS", 70, 115);
    
    // Room Details Box
    doc.setFillColor(240, 248, 255);
    doc.roundedRect(20, 120, 170, 45, 3, 3, 'F');
    
    doc.setFontSize(10);
    doc.setTextColor(0, 0, 0);
    doc.text("Room Type:", 30, 130);
    doc.text("Check-in:", 30, 140);
    doc.text("Check-out:", 30, 150);
    doc.text("Nights:", 30, 160);
    
    doc.setFont("helvetica", "bold");
    doc.setTextColor(0, 150, 0);
    doc.text(room, 100, 130);
    doc.text(checkin, 100, 140);
    doc.text(checkout, 100, 150);
    doc.text(nights, 100, 160);
    
    // Customer Details Box
    let y = 180;
    doc.setFillColor(245, 245, 245);
    doc.roundedRect(20, y, 170, 30, 3, 3, 'F');
    
    doc.setFontSize(10);
    doc.setTextColor(0, 0, 0);
    doc.setFont("helvetica", "bold");
    doc.text("CUSTOMER DETAILS", 65, y + 8);
    
    doc.setFont("helvetica", "normal");
    doc.text("Email:", 30, y + 18);
    doc.text("Gender:", 30, y + 25);
    doc.text("Age:", 100, y + 25);
    
    doc.setFont("helvetica", "bold");
    doc.text(email.substring(0, 25), 70, y + 18);
    doc.text(gender, 70, y + 25);
    doc.text(age, 110, y + 25);
    
    // Calculate GST (18%)
    let subtotal = totalAmount;
    let gst = Math.round(totalAmount * 0.18);
    let grandTotal = subtotal + gst;
    
    // Payment Summary Box
    y += 45;
    doc.setFillColor(255, 255, 240);
    doc.roundedRect(20, y, 170, 55, 3, 3, 'F');
    
    doc.setFontSize(10);
    doc.setTextColor(0, 0, 0);
    doc.setFont("helvetica", "bold");
    doc.text("PAYMENT SUMMARY", 70, y + 8);
    
    doc.setFont("helvetica", "normal");
    doc.text("Room Charges:", 30, y + 18);
    doc.text("GST (18%):", 30, y + 28);
    doc.text("Grand Total:", 30, y + 38);
    doc.text("Payment Mode:", 30, y + 48);
    
    doc.setFont("helvetica", "bold");
    doc.setTextColor(0, 150, 0);
    doc.text("₹" + subtotal, 100, y + 18);
    doc.setTextColor(255, 140, 0);
    doc.text("₹" + gst, 100, y + 28);
    doc.setTextColor(0, 0, 255);
    doc.text("₹" + grandTotal, 100, y + 38);
    doc.setTextColor(0, 0, 0);
    doc.text(paymentMode, 100, y + 48);
    
    // Payment Status
    y += 65;
    doc.setFillColor(0, 150, 0);
    doc.roundedRect(70, y, 70, 10, 5, 5, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(8);
    doc.text("PAYMENT COMPLETED", 78, y + 7);
    
    // Booking Status
    y += 15;
    doc.setFillColor(0, 100, 200);
    doc.roundedRect(70, y, 70, 10, 5, 5, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(8);
    doc.text("BOOKING CONFIRMED", 78, y + 7);
    
    // ---------- Page 2 for Footer and QR Code ----------
    doc.addPage();
    
    // Header for Page 2 (light version)
    doc.setFillColor(255, 215, 0);
    doc.rect(0, 0, 210, 20, 'F');
    
    doc.setFontSize(14);
    doc.setTextColor(0, 0, 0);
    doc.setFont("helvetica", "bold");
    doc.text("HOTEL ROYAL STAY - Booking Summary", 40, 15);
    
    // Booking Summary on Page 2
    doc.setFontSize(12);
    doc.setTextColor(255, 215, 0);
    doc.text("BOOKING SUMMARY", 70, 35);
    
    doc.setFontSize(10);
    doc.setTextColor(0, 0, 0);
    doc.text("Booking ID:", 30, 50);
    doc.text("Customer Name:", 30, 60);
    doc.text("Room Type:", 30, 70);
    doc.text("Check-in Date:", 30, 80);
    doc.text("Check-out Date:", 30, 90);
    doc.text("Total Nights:", 30, 100);
    doc.text("Total Amount:", 30, 110);
    doc.text("Payment Mode:", 30, 120);
    
    doc.setFont("helvetica", "bold");
    doc.text(billId, 100, 50);
    doc.text(name, 100, 60);
    doc.text(room, 100, 70);
    doc.text(checkin, 100, 80);
    doc.text(checkout, 100, 90);
    doc.text(nights, 100, 100);
    doc.text("₹" + grandTotal, 100, 110);
    doc.text(paymentMode, 100, 120);
    
    // Terms and Conditions
    doc.setFontSize(10);
    doc.setTextColor(255, 0, 0);
    doc.text("TERMS & CONDITIONS:", 30, 140);
    
    doc.setFontSize(8);
    doc.setTextColor(100, 100, 100);
    doc.text("1. Check-in time: 12:00 PM | Check-out time: 11:00 AM", 30, 150);
    doc.text("2. Early check-in and late check-out subject to availability", 30, 157);
    doc.text("3. Government ID is mandatory at check-in", 30, 164);
    doc.text("4. This invoice is valid for the mentioned dates only", 30, 171);
    doc.text("5. Any damages will be charged extra", 30, 178);
    
    // Footer on Page 2
    let footerY = 230;
    doc.setDrawColor(255, 215, 0);
    doc.setLineWidth(0.5);
    doc.line(20, footerY, 190, footerY);
    
    doc.setFontSize(8);
    doc.setTextColor(150, 150, 150);
    doc.text("This is a computer generated invoice - Valid without signature", 30, footerY + 8);
    doc.text("Thank you for choosing Hotel Royal Stay!", 45, footerY + 15);
    doc.text("Book Smart • Stay Royal", 65, footerY + 22);
    
    // QR Code
    doc.setFillColor(0, 0, 0);
    doc.rect(160, footerY - 10, 20, 20, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(6);
    doc.text("Scan for", 165, footerY - 3);
    doc.text("Feedback", 167, footerY + 2);
    
    // Hotel Contact Information
    doc.setFontSize(8);
    doc.setTextColor(0, 0, 150);
    doc.text("Hotel Royal Stay | MG Road, Kolhapur | +91 9876543210", 40, footerY + 35);
    doc.text("Email: hotelroyalstay@gmail.com | GST: 27ABCDE1234F1Z5", 40, footerY + 42);
    
    doc.save("Hotel_Royal_Stay_Booking_Invoice.pdf");
}
</script>

</body>
</html>
