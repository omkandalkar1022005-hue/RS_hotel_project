<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lawn | Hotel Royal Stay</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:linear-gradient(135deg,#134E5E,#71B280);color:white;}

header{
text-align:center;
padding:25px;
font-size:30px;
font-weight:700;
background:black;
color:#00ffcc;
}

.slider{
width:90%;
max-width:1000px;
height:350px;
margin:30px auto;
position:relative;
overflow:hidden;
border-radius:15px;
}

.slides img{
width:100%;
height:350px;
object-fit:cover;
position:absolute;
opacity:0;
transition:1s;
}

.slides img.active{opacity:1;}

.lawn-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
}

.lawn-item{
background:rgba(255,255,255,0.1);
padding:15px;
border-radius:15px;
text-align:center;
transition:0.3s;
}

.lawn-item:hover{
transform:scale(1.05);
background:rgba(0,255,204,0.2);
}

button{
padding:8px 15px;
border:none;
background:linear-gradient(45deg,#00ffcc,#0099ff);
font-weight:bold;
border-radius:5px;
cursor:pointer;
}

.order-box{
background:black;
margin:30px;
padding:20px;
border-radius:15px;
}

footer{
text-align:center;
padding:20px;
background:black;
}
</style>
</head>
<body>

<header>🌿 Royal Lawn - Hotel Royal Stay 👑</header>

<div class="slider">
<div class="slides">
<img src="lawn1.jpg" class="active">
<img src="lawn2.jpg">
<img src="lawn3.jpg">
</div>
</div>

<h2 style="text-align:center;margin:20px;">🌸 Available Lawn Packages</h2>

<div class="lawn-container" id="lawnContainer"></div>

<div class="order-box">
<h2>📋 Lawn Booking Details</h2>
<p id="bookingDetails">No Lawn Booked</p>
<h3 id="total">Total: ₹0</h3>
<br>
<button onclick="payNow()">Confirm Booking</button>
</div>

<footer>© 2026 Hotel Royal Stay</footer>

<script>
let slideIndex=0;
const slides=document.querySelectorAll('.slides img');
setInterval(()=>{
slides.forEach(s=>s.classList.remove('active'));
slides[slideIndex].classList.add('active');
slideIndex=(slideIndex+1)%slides.length;
},3000);

let total=0;
let booking=[];

const lawns=[
["Wedding Lawn Package",80000],
["Reception Lawn Package",60000],
["Corporate Event Lawn",50000]
];

const container=document.getElementById("lawnContainer");

lawns.forEach((lawn,i)=>{
let div=document.createElement("div");
div.className="lawn-item";
div.innerHTML=`
<h3>${lawn[0]}</h3>
<p>Price: ₹${lawn[1]}</p>
<br>
<button onclick="bookLawn(${i})">Book Now</button>
`;
container.appendChild(div);
});

function bookLawn(i){
booking=[lawns[i][0]];
total=lawns[i][1];
document.getElementById("bookingDetails").innerText=booking;
document.getElementById("total").innerText="Total: ₹"+total;
}

function payNow(){
if(total==0){alert("Please Select Lawn First!");return;}
alert("Lawn Booking Confirmed 🌿");
total=0;
booking=[];
document.getElementById("bookingDetails").innerText="No Lawn Booked";
document.getElementById("total").innerText="Total: ₹0";
}
</script>

</body>
</html>
