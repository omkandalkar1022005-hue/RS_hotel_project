<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hotel Royal Stay</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins', sans-serif;
    background:#000;
    overflow-x:hidden;
}

/* Navbar */
.navbar{
    position:fixed;
    width:100%;
    padding:20px 80px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(8px);
    z-index:1000;
}

.logo{
    font-family:'Cinzel', serif;
    font-size:28px;
    font-weight:800;
    color:#ffd700;
    letter-spacing:3px;
}

.navbar a{
    text-decoration:none;
    color:white;
    margin-left:30px;
    font-size:15px;
    transition:0.3s;
}

.navbar a:hover{
    color:#ffd700;
}

/* Hero Section */
.hero{
    height:100vh;
    background:linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)),
    url("https://images.unsplash.com/photo-1551882547-ff40c63fe5fa");
    background-size:cover;
    background-position:center;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    color:white;
    animation:fadeIn 2s ease-in-out;
}

/* Stylish Heading */
.hero h1{
    font-family:'Cinzel', serif;
    font-size:70px;
    font-weight:800;
    background:linear-gradient(90deg,#ffd700,#ffffff,#ffd700);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    letter-spacing:4px;
    animation:slideDown 1.5s ease;
}

.hero p{
    font-size:22px;
    margin-top:20px;
    margin-bottom:40px;
    letter-spacing:2px;
    animation:fadeIn 3s ease;
}

/* Stylish Button */
.hero button{
    padding:15px 40px;
    font-size:16px;
    border:none;
    border-radius:40px;
    background:linear-gradient(90deg,#ffd700,#ffb700);
    cursor:pointer;
    font-weight:bold;
    transition:0.4s;
}

.hero button:hover{
    transform:scale(1.1);
    box-shadow:0 0 20px #ffd700;
}

/* Animations */
@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}

@keyframes slideDown{
    from{transform:translateY(-80px); opacity:0;}
    to{transform:translateY(0); opacity:1;}
}

/* Footer */
.footer{
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
}
</style>
</head>

<body>

<div class="navbar">
    <div class="logo">⭐⭐⭐  HOTEL ROYAL STAY</div>
    <div>
        <a href="#">Home</a>
        <a href="#">Rooms</a>
        <a href="#">Facilities</a>
        <a href="#">Contact</a>
        <a href="booking.html">Book Now</a>
    </div>
</div>

<div class="hero">
    <h1>Welcome to Royal Luxury</h1>
    <p>Experience Comfort • Experience Class • Experience Royalty</p>
    <button onclick="window.location.href='booking.html'">BOOK YOUR STAY</button>
</div>

<div class="footer">
    © 2026 Hotel Royal Stay | 3-Star Premium Hospitality
</div>

</body>
</html>
