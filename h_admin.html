<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hotel Admin Panel</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    display:flex;
    background:#f4f6fb;
}

/* Sidebar */
.sidebar{
    width:240px;
    height:100vh;
    background:linear-gradient(180deg,#1e3c72,#2a5298);
    color:white;
    padding:20px;
}

.sidebar h2{
    text-align:center;
    margin-bottom:30px;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    padding:12px;
    margin-bottom:10px;
    border-radius:6px;
    transition:0.3s;
}

.sidebar a:hover{
    background:rgba(255,255,255,0.2);
}

/* Main */
.main{
    flex:1;
    padding:25px;
}

/* Header */
.header{
    background:white;
    padding:15px 20px;
    border-radius:8px;
    box-shadow:0 4px 8px rgba(0,0,0,0.1);
    margin-bottom:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.header h1{
    font-size:22px;
}

/* Cards */
.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:25px;
}

.card{
    padding:20px;
    border-radius:10px;
    color:white;
    box-shadow:0 5px 12px rgba(0,0,0,0.1);
}

.card h3{
    margin-bottom:10px;
}

.card1{ background:#ff7e5f; }
.card2{ background:#43cea2; }
.card3{ background:#667eea; }
.card4{ background:#f7971e; }

/* Table */
.table-container{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 5px 12px rgba(0,0,0,0.1);
}

table{
    width:100%;
    border-collapse:collapse;
}

table th, table td{
    padding:10px;
    text-align:left;
    border-bottom:1px solid #ddd;
}

table th{
    background:#f1f1f1;
}

.status{
    padding:5px 10px;
    border-radius:5px;
    color:white;
    font-size:12px;
}

.available{ background:#28a745; }
.booked{ background:#dc3545; }

/* Button */
button{
    padding:6px 12px;
    background:#2a5298;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#1e3c72;
}
</style>
</head>

<body>

<div class="sidebar">
    <h2>⭐ 3-Star Hotel</h2>
    <a href="#">Dashboard</a>
    <a href="#">Manage Rooms</a>
    <a href="#">Bookings</a>
    <a href="#">Customers</a>
    <a href="#">Payments</a>
    <a href="#">Reports</a>
    <a href="#">Logout</a>
</div>

<div class="main">

<div class="header">
    <h1>Admin Dashboard</h1>
    <div>Welcome, Admin</div>
</div>

<div class="cards">
    <div class="card card1">
        <h3>Total Rooms</h3>
        <h2>50</h2>
    </div>
    <div class="card card2">
        <h3>Available Rooms</h3>
        <h2>32</h2>
    </div>
    <div class="card card3">
        <h3>Booked Rooms</h3>
        <h2>18</h2>
    </div>
    <div class="card card4">
        <h3>Total Revenue</h3>
        <h2>₹1,25,000</h2>
    </div>
</div>

<div class="table-container">
    <h2>Room Status</h2>
    <br>
    <table>
        <tr>
            <th>Room No</th>
            <th>Type</th>
            <th>Status</th>
            <th>Action</th>
        </tr>
        <tr>
            <td>101</td>
            <td>Deluxe</td>
            <td><span class="status available">Available</span></td>
            <td><button>Book</button></td>
        </tr>
        <tr>
            <td>102</td>
            <td>Suite</td>
            <td><span class="status booked">Booked</span></td>
            <td><button>View</button></td>
        </tr>
        <tr>
            <td>103</td>
            <td>AC</td>
            <td><span class="status available">Available</span></td>
            <td><button>Book</button></td>
        </tr>
    </table>
</div>

</div>

</body>
</html>
